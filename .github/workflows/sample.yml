name: Guidewire Security Pipeline

on:
  repository_dispatch:
    types: [app-trigger]

jobs:

  security-scan:
    runs-on: self-hosted
    timeout-minutes: 60

    outputs:
      total: ${{ steps.aggregate.outputs.total }}

    steps:

    # -------------------------------------------------
    # Read payload (PowerShell safe)
    # -------------------------------------------------
    - name: Read payload
      id: payload
      shell: powershell
      run: |
        $repo   = "${{ github.event.client_payload.repo }}"
        $branch = "${{ github.event.client_payload.branch }}"
        $commit = "${{ github.event.client_payload.commit }}"
        $prUrl  = "${{ github.event.client_payload.prUrl }}"

        # Remove refs/heads/
        $branch = $branch -replace '^refs/heads/',''

        "repo=$repo"   >> $env:GITHUB_OUTPUT
        "branch=$branch" >> $env:GITHUB_OUTPUT
        "commit=$commit" >> $env:GITHUB_OUTPUT
        "prurl=$prUrl" >> $env:GITHUB_OUTPUT

        Write-Host "Repo: $repo"
        Write-Host "Branch: $branch"
        Write-Host "Commit: $commit"

    - name: Download portable Git
      shell: powershell
      run: |
        $url = "https://github.com/git-for-windows/git/releases/latest/download/PortableGit-64-bit.7z.exe"
        $zip = "$env:RUNNER_TEMP\git.exe"

        Invoke-WebRequest $url -OutFile $zip

        Start-Process $zip -ArgumentList "-o$env:RUNNER_TEMP\git -y" -Wait

        $gitPath = Get-ChildItem "$env:RUNNER_TEMP\git" -Recurse -Filter git.exe | Select-Object -First 1
        $env:PATH += ";" + $gitPath.Directory.FullName

        git --version

    
    # -------------------------------------------------
    # Clone Guidewire repo (PowerShell + header auth)
    # -------------------------------------------------
    - name: Clone Guidewire repo
      shell: powershell
      env:
        HOST: ${{ secrets.GW_BITBUCKET_BASE }}
        TOKEN: ${{ secrets.GW_BITBUCKET_TOKEN }}
      run: |
        $repo   = "${{ steps.payload.outputs.repo }}"
        $branch = "${{ steps.payload.outputs.branch }}"
        $project = "gwcpdev"

        $repoLower = $repo.ToLower()
        $cloneUrl = "https://$env:HOST/scm/$project/$repoLower.git"

        Write-Host "Cloning $cloneUrl"

        git config --global http.extraheader "Authorization: Bearer $env:TOKEN"
        git clone --depth 50 $cloneUrl repo

        cd repo
        git checkout $branch

    # -------------------------------------------------
    # Detect changed files
    # -------------------------------------------------
    - name: Detect changed files
      id: diff
      shell: powershell
      run: |
        cd repo
        git diff --name-only HEAD~3 HEAD > ..\changed_files.txt

        Write-Host "Changed files:"
        Get-Content ..\changed_files.txt

    # -------------------------------------------------
    # Install Semgrep (Windows safe)
    # -------------------------------------------------
    - name: Install Semgrep
      shell: powershell
      run: |
        pip install semgrep

    # -------------------------------------------------
    # Install Gitleaks (Windows safe)
    # -------------------------------------------------
    - name: Install Gitleaks
      shell: powershell
      run: |
        $url = "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_windows_x64.zip"
        Invoke-WebRequest $url -OutFile gitleaks.zip
        Expand-Archive gitleaks.zip -DestinationPath .
        Move-Item .\gitleaks.exe C:\Windows\System32\gitleaks.exe
        gitleaks version

    # -------------------------------------------------
    # Run Semgrep incremental
    # -------------------------------------------------
    - name: Run Semgrep
      shell: powershell
      run: |
        $files = Get-Content changed_files.txt

        if ($files.Count -gt 0) {
            semgrep scan --config=auto `
              --json -o semgrep-report.json `
              $files
        } else {
            '{"results":[]}' | Out-File semgrep-report.json
        }

    # -------------------------------------------------
    # Run Gitleaks
    # -------------------------------------------------
    - name: Run Gitleaks
      shell: powershell
      run: |
        cd repo
        gitleaks detect `
          --source . `
          --report-format json `
          --report-path ..\gitleaks-report.json
        cd ..

    # -------------------------------------------------
    # Aggregate results (PowerShell JSON)
    # -------------------------------------------------
    - name: Aggregate findings
      id: aggregate
      shell: powershell
      run: |
        $semgrep = 0
        $gitleaks = 0

        if (Test-Path semgrep-report.json) {
          $semgrep = (Get-Content semgrep-report.json | ConvertFrom-Json).results.Count
        }

        if (Test-Path gitleaks-report.json) {
          $gitleaks = (Get-Content gitleaks-report.json | ConvertFrom-Json).Count
        }

        $total = $semgrep + $gitleaks

        Write-Host "Semgrep: $semgrep"
        Write-Host "Gitleaks: $gitleaks"
        Write-Host "TOTAL: $total"

        "total=$total" >> $env:GITHUB_OUTPUT

    # -------------------------------------------------
    # HTML dashboard (PowerShell)
    # -------------------------------------------------
    - name: Generate HTML dashboard
      shell: powershell
      run: |
        mkdir site -Force

        $html = @"
        <html>
        <body>
        <h1>Guidewire Security Dashboard</h1>
        <h2>Total Findings: ${{ steps.aggregate.outputs.total }}</h2>
        </body>
        </html>
          "@

        $html | Out-File site\index.html

    # -------------------------------------------------
    # Upload reports
    # -------------------------------------------------
    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guidewire-security-reports
        path: |
          semgrep-report.json
          gitleaks-report.json
          changed_files.txt
          site/index.html

    # -------------------------------------------------
    # Get Okta token (PowerShell)
    # -------------------------------------------------
    - name: Get Okta token
      id: okta
      shell: powershell
      env:
        OKTA_URL: ${{ secrets.OKTA_TOKEN_URL }}
        CLIENT_ID: ${{ secrets.OKTA_CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }}
        TENANT: ${{ secrets.GW_TENANT }}
        STAR: ${{ secrets.GW_STAR_SYSTEM }}
      run: |
        $body = @{
          grant_type="client_credentials"
          scope="cicd.qualitygates.read cicd.qualitygates.write tenant.$env:TENANT project.$env:STAR"
          client_id=$env:CLIENT_ID
          client_secret=$env:CLIENT_SECRET
        }

        $resp = Invoke-RestMethod -Method Post -Uri $env:OKTA_URL -Body $body
        "token=$($resp.access_token)" >> $env:GITHUB_OUTPUT

    # -------------------------------------------------
    # Update Guidewire Quality Gate
    # -------------------------------------------------
    - name: Update Guidewire Quality Gate
      shell: powershell
      env:
        GW_URL: ${{ secrets.GW_CICD_BASE_URL }}
        TENANT: ${{ secrets.GW_TENANT }}
        STAR: ${{ secrets.GW_STAR_SYSTEM }}
        APP: ${{ steps.payload.outputs.repo }}
        TOKEN: ${{ steps.okta.outputs.token }}
        COMMIT: ${{ steps.payload.outputs.commit }}
        PR_URL: ${{ steps.payload.outputs.prurl }}
      run: |
        $total = "${{ steps.aggregate.outputs.total }}"

        if ($total -gt 0) {
            $status="FAILED"
            $comment="Security findings detected"
        } else {
            $status="SUCCESSFUL"
            $comment="Security scans passed"
        }

        $body = @{
          artifact=@{ type="COMMIT"; id=$env:COMMIT }
          status=$status
          url=$env:PR_URL
          comment=$comment
        } | ConvertTo-Json -Depth 5

        Invoke-RestMethod `
          -Method Post `
          -Uri "$env:GW_URL/api/v3/tenants/$env:TENANT/starsystems/$env:STAR/applications/$env:APP/quality-gates/prqualitygate/verifications" `
          -Headers @{ Authorization="Bearer $env:TOKEN" } `
          -Body $body `
          -ContentType "application/json"

  # -------------------------------------------------
  # FINAL GATE
  # -------------------------------------------------
  final-gate:
    needs: security-scan
    runs-on: self-hosted
    steps:
      - name: Enforce security gate
        shell: powershell
        run: |
          $total = "${{ needs.security-scan.outputs.total }}"
          if ($total -gt 0) {
              Write-Host "Security findings detected"
              exit 1
          } else {
              Write-Host "Security gate passed"
          }
